<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Turds 💩</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #87CEEB; display: flex; flex-direction: column; align-items: center; font-family: 'Comic Sans MS', cursive, sans-serif; overflow-x: hidden; min-height: 100vh; }
#header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 960px; padding: 10px 20px; background: #8B4513; color: #FFD700; border-bottom: 4px solid #5C3317; flex-wrap: wrap; gap: 4px; }
#header h1 { font-size: clamp(16px, 4vw, 28px); text-shadow: 2px 2px #000; white-space: nowrap; }
#score-display { font-size: clamp(14px, 3vw, 22px); text-shadow: 1px 1px #000; }
#level-display { font-size: clamp(12px, 2.5vw, 18px); text-shadow: 1px 1px #000; }
#game-wrapper { width: 100%; max-width: 960px; position: relative; }
canvas { width: 100%; height: auto; display: block; border: 3px solid #5C3317; cursor: crosshair; touch-action: none; }
#controls { margin-top: 10px; display: flex; gap: 15px; }
button { padding: 12px 24px; font-size: clamp(14px, 3vw, 16px); font-family: 'Comic Sans MS', cursive; background: #8B4513; color: #FFD700; border: 2px solid #5C3317; cursor: pointer; border-radius: 8px; text-shadow: 1px 1px #000; -webkit-tap-highlight-color: transparent; }
button:hover { background: #A0522D; }
#message { font-size: clamp(20px, 5vw, 36px); color: #FFD700; text-shadow: 3px 3px #000; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 10; pointer-events: none; background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 12px; text-align: center; max-width: 90%; }
#ammo-display { font-size: clamp(12px, 2.5vw, 16px); text-shadow: 1px 1px #000; color: #FFD700; }

/* Mobile tweaks */
@media (max-width: 600px) {
  #header { padding: 6px 10px; }
  #header h1 { font-size: 14px; }
  #controls { gap: 10px; }
  button { padding: 14px 20px; min-height: 48px; }
}
@media (hover: none) {
  canvas { cursor: default; }
}
</style>
</head>
<body>
<div id="header">
  <h1>💩 Angry Turds 💩</h1>
  <div id="level-display">Level: 1</div>
  <div id="ammo-display">Ammo: 💩💩💩</div>
  <div id="score-display">Score: 0</div>
</div>
<div id="game-wrapper">
  <canvas id="game" width="960" height="540"></canvas>
  <div id="message"></div>
</div>
<div id="controls">
  <button onclick="game.restart()">Restart Level</button>
  <button onclick="game.nextLevel()">Next Level</button>
</div>


<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Physics constants — tuned so a max pull (100px) at 45deg reaches ~700px range
const GRAVITY = 0.3;
const GROUND_Y = 460;
const SLING_X = 150;
const SLING_Y = GROUND_Y - 70; // sling sits above ground
const MAX_PULL = 100;
const FORCE_MULT = 0.22; // vx/vy = pull_distance * FORCE_MULT

function getMaxHp(type) {
  switch(type) {
    case 'wood': return 60;
    case 'stone': return 150;
    case 'glass': return 25;
    case 'pig': return 40;
    default: return 100;
  }
}

class Body {
  constructor(x, y, w, h, type) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.type = type;
    this.maxHpVal = getMaxHp(type);
    this.hp = this.maxHpVal;
    this.vx = 0; this.vy = 0;
    this.angle = 0; this.angVel = 0;
    this.alive = true;
    this.awake = false;
  }

  update() {
    if (!this.alive) return;
    if (!this.awake) return;
    this.vy += GRAVITY;
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.angVel;
    this.vx *= 0.98;
    this.angVel *= 0.93;

    if (this.y + this.h/2 > GROUND_Y) {
      this.y = GROUND_Y - this.h/2;
      if (this.vy > 4) this.damage(this.vy * 2);
      this.vy *= -0.25;
      this.vx *= 0.6;
      this.angVel *= 0.4;
      if (Math.abs(this.vy) < 1) this.vy = 0;
      if (Math.abs(this.vx) < 0.2) this.vx = 0;
    }
    if (this.x - this.w/2 < 0) { this.x = this.w/2; this.vx *= -0.4; }
    if (this.x + this.w/2 > 960) { this.x = 960 - this.w/2; this.vx *= -0.4; }
  }

  damage(amount) {
    this.hp -= amount;
    this.awake = true;
    if (this.hp <= 0) this.alive = false;
  }

  wake() { this.awake = true; }

  collidesWith(other) {
    return this.alive && other.alive &&
      Math.abs(this.x - other.x) < (this.w + other.w) / 2 &&
      Math.abs(this.y - other.y) < (this.h + other.h) / 2;
  }
}

class Turd {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.radius = 14;
    this.alive = true;
    this.launched = false;
    this.trail = [];
    this.splat = false;
    this.splatTimer = 0;
  }

  update() {
    if (this.splat) {
      this.splatTimer++;
      return this.splatTimer < 120;
    }
    if (!this.launched) return true;

    this.vy += GRAVITY;
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.999;

    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 50) this.trail.shift();

    if (this.y + this.radius > GROUND_Y) {
      this.y = GROUND_Y - this.radius;
      this.splat = true;
      this.vx = 0; this.vy = 0;
    }
    if (this.x > 980 || this.x < -20 || this.y > 560) this.alive = false;
    return this.alive;
  }

  collidesBody(body) {
    if (!this.alive || !body.alive || this.splat) return false;
    let cx = Math.max(body.x - body.w/2, Math.min(this.x, body.x + body.w/2));
    let cy = Math.max(body.y - body.h/2, Math.min(this.y, body.y + body.h/2));
    let dx = this.x - cx, dy = this.y - cy;
    return dx*dx + dy*dy < this.radius * this.radius;
  }
}

const levels = [
  {
    ammo: 3,
    structures: [
      { x: 550, y: GROUND_Y-55, w: 20, h: 110, type: 'wood' },
      { x: 620, y: GROUND_Y-55, w: 20, h: 110, type: 'wood' },
      { x: 585, y: GROUND_Y-120, w: 90, h: 20, type: 'wood' },
      { x: 585, y: GROUND_Y-140, w: 30, h: 30, type: 'pig' },
    ]
  },
  {
    ammo: 4,
    structures: [
      { x: 500, y: GROUND_Y-55, w: 20, h: 110, type: 'wood' },
      { x: 570, y: GROUND_Y-55, w: 20, h: 110, type: 'wood' },
      { x: 535, y: GROUND_Y-120, w: 90, h: 20, type: 'wood' },
      { x: 535, y: GROUND_Y-145, w: 30, h: 30, type: 'pig' },
      { x: 680, y: GROUND_Y-40, w: 20, h: 80, type: 'glass' },
      { x: 740, y: GROUND_Y-40, w: 20, h: 80, type: 'glass' },
      { x: 710, y: GROUND_Y-90, w: 80, h: 20, type: 'glass' },
      { x: 710, y: GROUND_Y-110, w: 30, h: 30, type: 'pig' },
    ]
  },
  {
    ammo: 5,
    structures: [
      { x: 520, y: GROUND_Y-30, w: 20, h: 60, type: 'stone' },
      { x: 580, y: GROUND_Y-30, w: 20, h: 60, type: 'stone' },
      { x: 550, y: GROUND_Y-70, w: 80, h: 20, type: 'stone' },
      { x: 520, y: GROUND_Y-100, w: 20, h: 60, type: 'wood' },
      { x: 580, y: GROUND_Y-100, w: 20, h: 60, type: 'wood' },
      { x: 550, y: GROUND_Y-140, w: 80, h: 20, type: 'wood' },
      { x: 550, y: GROUND_Y-160, w: 30, h: 30, type: 'pig' },
      { x: 680, y: GROUND_Y-30, w: 15, h: 60, type: 'glass' },
      { x: 730, y: GROUND_Y-30, w: 15, h: 60, type: 'glass' },
      { x: 705, y: GROUND_Y-70, w: 65, h: 15, type: 'glass' },
      { x: 705, y: GROUND_Y-90, w: 30, h: 30, type: 'pig' },
    ]
  },
  {
    ammo: 5,
    structures: [
      { x: 480, y: GROUND_Y-50, w: 25, h: 100, type: 'stone' },
      { x: 540, y: GROUND_Y-50, w: 25, h: 100, type: 'stone' },
      { x: 600, y: GROUND_Y-50, w: 25, h: 100, type: 'stone' },
      { x: 660, y: GROUND_Y-50, w: 25, h: 100, type: 'stone' },
      { x: 510, y: GROUND_Y-110, w: 80, h: 20, type: 'wood' },
      { x: 570, y: GROUND_Y-110, w: 80, h: 20, type: 'wood' },
      { x: 630, y: GROUND_Y-110, w: 80, h: 20, type: 'wood' },
      { x: 510, y: GROUND_Y-130, w: 25, h: 30, type: 'pig' },
      { x: 570, y: GROUND_Y-130, w: 25, h: 30, type: 'pig' },
      { x: 630, y: GROUND_Y-130, w: 30, h: 30, type: 'pig' },
      { x: 750, y: GROUND_Y-30, w: 20, h: 60, type: 'glass' },
      { x: 800, y: GROUND_Y-30, w: 20, h: 60, type: 'glass' },
      { x: 775, y: GROUND_Y-70, w: 70, h: 20, type: 'wood' },
      { x: 775, y: GROUND_Y-95, w: 30, h: 30, type: 'pig' },
    ]
  },
  {
    ammo: 6,
    structures: [
      { x: 500, y: GROUND_Y-40, w: 20, h: 80, type: 'stone' },
      { x: 560, y: GROUND_Y-40, w: 20, h: 80, type: 'stone' },
      { x: 530, y: GROUND_Y-90, w: 80, h: 20, type: 'stone' },
      { x: 500, y: GROUND_Y-120, w: 20, h: 60, type: 'wood' },
      { x: 560, y: GROUND_Y-120, w: 20, h: 60, type: 'wood' },
      { x: 530, y: GROUND_Y-160, w: 80, h: 20, type: 'wood' },
      { x: 530, y: GROUND_Y-180, w: 30, h: 30, type: 'pig' },
      { x: 650, y: GROUND_Y-30, w: 15, h: 60, type: 'glass' },
      { x: 700, y: GROUND_Y-30, w: 15, h: 60, type: 'glass' },
      { x: 675, y: GROUND_Y-70, w: 65, h: 15, type: 'glass' },
      { x: 675, y: GROUND_Y-90, w: 30, h: 30, type: 'pig' },
      { x: 770, y: GROUND_Y-40, w: 20, h: 80, type: 'stone' },
      { x: 830, y: GROUND_Y-40, w: 20, h: 80, type: 'stone' },
      { x: 800, y: GROUND_Y-90, w: 80, h: 20, type: 'stone' },
      { x: 800, y: GROUND_Y-115, w: 30, h: 30, type: 'pig' },
      { x: 800, y: GROUND_Y-145, w: 30, h: 30, type: 'pig' },
    ]
  },
];

class Game {
  constructor() {
    this.level = 0;
    this.score = 0;
    this.bodies = [];
    this.turds = [];
    this.currentTurd = null;
    this.ammo = 0;
    this.dragging = false;
    this.pullX = 0; this.pullY = 0;
    this.particles = [];
    this.stinkLines = [];
    this.scoredPigs = new Set();
    this.scoredBodies = new Set();
    this.gameState = 'aiming';
    this.settleTimer = 0;
    this.loadLevel();
    this.setupInput();
    this.loop();
  }

  loadLevel() {
    const lvl = levels[this.level % levels.length];
    this.bodies = [];
    this.turds = [];
    this.particles = [];
    this.stinkLines = [];
    this.scoredPigs = new Set();
    this.scoredBodies = new Set();
    this.ammo = lvl.ammo;
    this.gameState = 'aiming';
    this.settleTimer = 0;
    this.dragging = false;
    this.currentTurd = null;
    this.spawnTurd();
    document.getElementById('level-display').textContent = 'Level: ' + (this.level + 1);
    document.getElementById('message').style.display = 'none';
    this.updateAmmoDisplay();

    lvl.structures.forEach(s => {
      this.bodies.push(new Body(s.x, s.y, s.w, s.h, s.type));
    });
  }

  updateAmmoDisplay() {
    document.getElementById('ammo-display').textContent = 'Ammo: ' + ('💩'.repeat(this.ammo) || 'EMPTY');
  }

  spawnTurd() {
    if (this.ammo <= 0) return;
    this.currentTurd = new Turd(SLING_X, SLING_Y);
  }

  setupInput() {
    canvas.addEventListener('mousedown', e => this.onDown(e));
    canvas.addEventListener('mousemove', e => this.onMove(e));
    canvas.addEventListener('mouseup', e => this.onUp(e));
    canvas.addEventListener('touchstart', e => { e.preventDefault(); this.onDown(e.touches[0]); }, {passive:false});
    canvas.addEventListener('touchmove', e => { e.preventDefault(); this.onMove(e.touches[0]); }, {passive:false});
    canvas.addEventListener('touchend', e => { e.preventDefault(); this.onUp(e); }, {passive:false});
  }

  getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (960 / rect.width),
      y: (e.clientY - rect.top) * (540 / rect.height)
    };
  }

  onDown(e) {
    if (this.gameState !== 'aiming' || !this.currentTurd) return;
    const pos = this.getPos(e);
    const dx = pos.x - SLING_X, dy = pos.y - SLING_Y;
    if (dx*dx + dy*dy < 4000) {
      this.dragging = true;
      this.pullX = 0; this.pullY = 0;
    }
  }

  onMove(e) {
    if (!this.dragging || !this.currentTurd) return;
    const pos = this.getPos(e);
    // Pull vector: from sling to mouse
    let dx = pos.x - SLING_X;
    let dy = pos.y - SLING_Y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > MAX_PULL) {
      dx = dx/dist * MAX_PULL;
      dy = dy/dist * MAX_PULL;
    }
    this.pullX = dx;
    this.pullY = dy;
    this.currentTurd.x = SLING_X + dx;
    this.currentTurd.y = SLING_Y + dy;
  }

  onUp(e) {
    if (!this.dragging || !this.currentTurd) return;
    this.dragging = false;

    // Launch direction is OPPOSITE of pull (pull back = launch forward)
    const launchVx = -this.pullX * FORCE_MULT;
    const launchVy = -this.pullY * FORCE_MULT;
    const power = Math.sqrt(launchVx*launchVx + launchVy*launchVy);

    if (power < 2) {
      // Too weak, reset
      this.currentTurd.x = SLING_X;
      this.currentTurd.y = SLING_Y;
      this.pullX = 0; this.pullY = 0;
      return;
    }

    this.currentTurd.vx = launchVx;
    this.currentTurd.vy = launchVy;
    this.currentTurd.launched = true;
    this.turds.push(this.currentTurd);
    this.currentTurd = null;
    this.ammo--;
    this.updateAmmoDisplay();
    this.gameState = 'flying';
    this.pullX = 0; this.pullY = 0;
  }

  wakeNearby(body) {
    this.bodies.forEach(b => {
      if (!b.alive || b.awake) return;
      const dx = Math.abs(b.x - body.x);
      const dy = Math.abs(b.y - body.y);
      if (dx < (b.w + body.w)/2 + 10 && dy < (b.h + body.h)/2 + 40) {
        b.wake();
      }
    });
  }

  checkCollisions() {
    for (const turd of this.turds) {
      if (!turd.alive || turd.splat || !turd.launched) continue;
      for (const body of this.bodies) {
        if (!body.alive) continue;
        if (turd.collidesBody(body)) {
          const speed = Math.sqrt(turd.vx*turd.vx + turd.vy*turd.vy);
          const damage = speed * 18;
          body.damage(damage);
          body.vx += turd.vx * 0.5;
          body.vy += turd.vy * 0.4;
          body.angVel += (Math.random() - 0.5) * 0.15;
          this.wakeNearby(body);
          turd.vx *= 0.2;
          turd.vy *= 0.2;
          for (let i = 0; i < 10; i++) {
            this.particles.push({
              x: turd.x, y: turd.y,
              vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8 - 2,
              life: 25 + Math.random()*25,
              color: body.type === 'wood' ? '#8B4513' : body.type === 'stone' ? '#888' : body.type === 'glass' ? '#8CF' : '#4A4',
              size: 2 + Math.random()*5
            });
          }
          this.stinkLines.push({ x: turd.x, y: turd.y, life: 60 });
        }
      }
    }

    for (let i = 0; i < this.bodies.length; i++) {
      for (let j = i+1; j < this.bodies.length; j++) {
        const a = this.bodies[i], b = this.bodies[j];
        if (!a.alive || !b.alive || (!a.awake && !b.awake)) continue;
        if (a.collidesWith(b)) {
          const overlapX = (a.w + b.w)/2 - Math.abs(a.x - b.x);
          const overlapY = (a.h + b.h)/2 - Math.abs(a.y - b.y);
          if (overlapX <= 0 || overlapY <= 0) continue;
          if (overlapX < overlapY) {
            const dir = a.x < b.x ? -1 : 1;
            a.x += dir * overlapX * 0.5;
            b.x -= dir * overlapX * 0.5;
            const relVx = a.vx - b.vx;
            a.vx -= relVx * 0.5;
            b.vx += relVx * 0.5;
            if (Math.abs(relVx) > 4) { a.damage(Math.abs(relVx) * 3); b.damage(Math.abs(relVx) * 3); }
          } else {
            const dir = a.y < b.y ? -1 : 1;
            a.y += dir * overlapY * 0.5;
            b.y -= dir * overlapY * 0.5;
            const relVy = a.vy - b.vy;
            a.vy -= relVy * 0.5;
            b.vy += relVy * 0.5;
            if (Math.abs(relVy) > 4) { a.damage(Math.abs(relVy) * 3); b.damage(Math.abs(relVy) * 3); }
          }
          a.wake(); b.wake();
        }
      }
    }
  }

  update() {
    this.bodies.forEach(b => b.update());
    this.turds = this.turds.filter(t => t.update());
    this.checkCollisions();

    this.particles = this.particles.filter(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life--;
      return p.life > 0;
    });
    this.stinkLines = this.stinkLines.filter(s => { s.life--; return s.life > 0; });

    this.bodies.forEach((b, i) => {
      if (b.alive) return;
      if (b.type === 'pig' && !this.scoredPigs.has(i)) {
        this.score += 5000;
        this.scoredPigs.add(i);
      } else if (b.type !== 'pig' && !this.scoredBodies.has(i)) {
        this.score += 500;
        this.scoredBodies.add(i);
      }
    });
    document.getElementById('score-display').textContent = 'Score: ' + this.score;

    const pigsAlive = this.bodies.filter(b => b.type === 'pig' && b.alive).length;

    if (pigsAlive === 0 && this.gameState !== 'won' && this.gameState !== 'lost') {
      this.gameState = 'won';
      const bonus = this.ammo * 10000;
      this.score += bonus;
      document.getElementById('score-display').textContent = 'Score: ' + this.score;
      this.showMessage('🏆 LEVEL COMPLETE! +' + bonus + ' bonus 💰');
      return;
    }

    if (this.gameState === 'flying') {
      const allSettled = this.turds.filter(t => t.launched).every(t => t.splat || !t.alive);
      if (allSettled) {
        this.gameState = 'settling';
        this.settleTimer = 0;
      }
    }

    if (this.gameState === 'settling') {
      this.settleTimer++;
      const allStopped = this.bodies.every(b => !b.alive || !b.awake || (Math.abs(b.vx) < 0.5 && Math.abs(b.vy) < 0.5));
      if (allStopped || this.settleTimer > 150) {
        this.bodies.forEach(b => { b.vx = 0; b.vy = 0; b.angVel = 0; });
        if (pigsAlive > 0 && this.ammo <= 0) {
          this.gameState = 'lost';
          this.showMessage('💀 FAILED — ' + pigsAlive + ' pig' + (pigsAlive > 1 ? 's' : '') + ' survived');
        } else if (pigsAlive > 0) {
          this.gameState = 'aiming';
          this.spawnTurd();
        }
      }
    }
  }

  showMessage(text) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.style.display = 'block';
  }

  // Predict trajectory using SAME physics as Turd.update()
  predictTrajectory(vx, vy) {
    const points = [];
    let x = SLING_X, y = SLING_Y;
    let tvx = vx, tvy = vy;
    for (let i = 0; i < 200; i++) {
      tvy += GRAVITY;
      x += tvx;
      y += tvy;
      tvx *= 0.999;
      if (y > GROUND_Y || x > 960 || x < 0) break;
      if (i % 4 === 0) points.push({x, y});
    }
    return points;
  }

  draw() {
    ctx.clearRect(0, 0, 960, 540);

    // Sky
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    skyGrad.addColorStop(0, '#4A90D9');
    skyGrad.addColorStop(1, '#87CEEB');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, 960, GROUND_Y);

    // Sun
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(870, 60, 35, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,215,0,0.12)';
    ctx.beginPath();
    ctx.arc(870, 60, 55, 0, Math.PI*2);
    ctx.fill();

    // Clouds
    this.drawCloud(200, 80);
    this.drawCloud(500, 50);
    this.drawCloud(780, 100);

    // Ground
    const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, 540);
    groundGrad.addColorStop(0, '#7CCD7C');
    groundGrad.addColorStop(1, '#4A8B4A');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, GROUND_Y, 960, 80);
    ctx.fillStyle = '#8B6B3D';
    ctx.fillRect(0, GROUND_Y, 960, 3);

    // Grass
    ctx.strokeStyle = '#5BA55B';
    ctx.lineWidth = 2;
    for (let i = 0; i < 960; i += 25) {
      ctx.beginPath();
      ctx.moveTo(i, GROUND_Y); ctx.lineTo(i-4, GROUND_Y-7);
      ctx.moveTo(i, GROUND_Y); ctx.lineTo(i+4, GROUND_Y-5);
      ctx.stroke();
    }

    // Slingshot back
    this.drawSlingshotBack();

    // Bodies
    this.bodies.forEach(b => this.drawBody(b));

    // Old turds
    this.turds.forEach(t => this.drawTurd(t));

    // Current turd on sling
    if (this.currentTurd && !this.currentTurd.launched) {
      this.drawTurd(this.currentTurd);
    }

    // Slingshot front
    this.drawSlingshotFront();

    // Trajectory preview — uses EXACT same physics
    if (this.dragging && this.currentTurd) {
      const launchVx = -this.pullX * FORCE_MULT;
      const launchVy = -this.pullY * FORCE_MULT;
      const points = this.predictTrajectory(launchVx, launchVy);
      points.forEach((p, i) => {
        ctx.globalAlpha = Math.max(0, 0.5 - i * 0.015);
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      // Power indicator
      const power = Math.sqrt(launchVx*launchVx + launchVy*launchVy);
      const maxPower = MAX_PULL * FORCE_MULT;
      const pct = Math.min(power / maxPower, 1);
      ctx.fillStyle = pct > 0.7 ? '#FF4444' : pct > 0.4 ? '#FFAA00' : '#44FF44';
      ctx.font = '14px Comic Sans MS, cursive';
      ctx.fillText('Power: ' + Math.round(pct*100) + '%', SLING_X - 30, SLING_Y + 40);
    }

    // Particles
    this.particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life / 50);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // Stink lines
    this.stinkLines.forEach(s => {
      ctx.globalAlpha = Math.max(0, s.life / 60);
      ctx.strokeStyle = '#6B8E23';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        const baseY = s.y - 22 - i*8;
        const wobble = Math.sin(Date.now()/150 + i) * 3;
        ctx.moveTo(s.x - 8, baseY);
        ctx.quadraticCurveTo(s.x + wobble, baseY - 7, s.x + 8, baseY);
        ctx.stroke();
      }
    });
    ctx.globalAlpha = 1;

    // Instructions
    if (this.gameState === 'aiming' && this.currentTurd && !this.dragging) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '16px Comic Sans MS, cursive, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Drag the 💩 backward from the slingshot, release to fling!', 480, 30);
      ctx.textAlign = 'left';
    }
  }

  drawCloud(x, y) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(x, y, 25, 0, Math.PI*2);
    ctx.arc(x+25, y-5, 20, 0, Math.PI*2);
    ctx.arc(x+50, y, 22, 0, Math.PI*2);
    ctx.arc(x+20, y+5, 18, 0, Math.PI*2);
    ctx.fill();
  }

  drawSlingshotBack() {
    ctx.fillStyle = '#5C3317';
    ctx.fillRect(SLING_X - 18, SLING_Y - 45, 8, 50);
    if (this.dragging && this.currentTurd) {
      ctx.strokeStyle = '#3B2507';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(SLING_X - 14, SLING_Y - 42);
      ctx.lineTo(this.currentTurd.x, this.currentTurd.y);
      ctx.stroke();
    }
  }

  drawSlingshotFront() {
    if (this.dragging && this.currentTurd) {
      ctx.strokeStyle = '#5C3317';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(SLING_X + 14, SLING_Y - 42);
      ctx.lineTo(this.currentTurd.x, this.currentTurd.y);
      ctx.stroke();
    }
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(SLING_X + 10, SLING_Y - 45, 8, 50);
    ctx.fillStyle = '#5C3317';
    ctx.beginPath();
    ctx.moveTo(SLING_X - 10, SLING_Y + 5);
    ctx.lineTo(SLING_X + 10, SLING_Y + 5);
    ctx.lineTo(SLING_X + 6, SLING_Y + 25);
    ctx.lineTo(SLING_X - 6, SLING_Y + 25);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#8B5A2B';
    ctx.beginPath();
    ctx.arc(SLING_X - 14, SLING_Y - 45, 5, 0, Math.PI*2);
    ctx.arc(SLING_X + 14, SLING_Y - 45, 5, 0, Math.PI*2);
    ctx.fill();
  }

  drawBody(body) {
    if (!body.alive) return;
    ctx.save();
    ctx.translate(body.x, body.y);
    ctx.rotate(body.angle);
    const hpRatio = body.hp / body.maxHpVal;

    if (body.type === 'wood') {
      ctx.fillStyle = hpRatio > 0.5 ? '#8B5A2B' : '#A0724A';
      ctx.fillRect(-body.w/2, -body.h/2, body.w, body.h);
      ctx.strokeStyle = '#5C3317'; ctx.lineWidth = 1.5;
      ctx.strokeRect(-body.w/2, -body.h/2, body.w, body.h);
      ctx.strokeStyle = 'rgba(92,51,23,0.3)'; ctx.lineWidth = 1;
      for (let i = -body.h/2+6; i < body.h/2; i += 8) {
        ctx.beginPath(); ctx.moveTo(-body.w/2+2, i); ctx.lineTo(body.w/2-2, i); ctx.stroke();
      }
      if (hpRatio < 0.5) {
        ctx.strokeStyle = '#3B2507'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-body.w/3,-body.h/3); ctx.lineTo(body.w/4,body.h/3); ctx.stroke();
      }
    } else if (body.type === 'stone') {
      ctx.fillStyle = hpRatio > 0.5 ? '#777' : '#999';
      ctx.fillRect(-body.w/2, -body.h/2, body.w, body.h);
      ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
      ctx.strokeRect(-body.w/2, -body.h/2, body.w, body.h);
      ctx.fillStyle = 'rgba(100,100,100,0.3)';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(Math.sin(i*47)*body.w*0.3-2, Math.cos(i*31)*body.h*0.3-2, 4, 4);
      }
      if (hpRatio < 0.7) {
        ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-body.w/3,-body.h/3); ctx.lineTo(body.w/5,body.h/4); ctx.stroke();
      }
    } else if (body.type === 'glass') {
      ctx.fillStyle = hpRatio > 0.5 ? 'rgba(150,210,255,0.6)' : 'rgba(180,220,255,0.4)';
      ctx.fillRect(-body.w/2, -body.h/2, body.w, body.h);
      ctx.strokeStyle = 'rgba(100,180,255,0.9)'; ctx.lineWidth = 1.5;
      ctx.strokeRect(-body.w/2, -body.h/2, body.w, body.h);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(-body.w/2+2, -body.h/2+2, body.w*0.3, 3);
    } else if (body.type === 'pig') {
      const r = body.w / 2;
      ctx.fillStyle = '#6BAA4B';
      ctx.beginPath(); ctx.arc(0, 0, r+2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#4A8B3B'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#6BAA4B';
      ctx.beginPath(); ctx.ellipse(-r*0.6,-r*0.7,r*0.3,r*0.2,-0.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(r*0.6,-r*0.7,r*0.3,r*0.2,0.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#7BC05B';
      ctx.beginPath(); ctx.ellipse(0,3,r*0.5,r*0.35,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#4A8B3B'; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = '#4A8B3B';
      ctx.beginPath(); ctx.ellipse(-3,3,2,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(3,3,2,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(-6,-5,5,0,Math.PI*2); ctx.arc(6,-5,5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(-6,-5,5,0,Math.PI*2); ctx.arc(6,-5,5,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-5,-5,2.5,0,Math.PI*2); ctx.arc(5,-5,2.5,0,Math.PI*2); ctx.fill();
      if (hpRatio < 0.7) {
        ctx.strokeStyle = '#4A8B3B'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-9,-7); ctx.lineTo(-3,-3); ctx.moveTo(-3,-7); ctx.lineTo(-9,-3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(3,-7); ctx.lineTo(9,-3); ctx.moveTo(9,-7); ctx.lineTo(3,-3); ctx.stroke();
      }
    }
    ctx.restore();
  }

  drawTurd(turd) {
    if (!turd.alive && !turd.splat) return;
    ctx.save();

    if (turd.splat) {
      const spread = Math.min(turd.splatTimer * 0.3, 25);
      ctx.fillStyle = '#6B4226';
      ctx.beginPath();
      ctx.ellipse(turd.x, GROUND_Y - 2, 18+spread, 5+spread*0.2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#7B5236';
      for (let i = 0; i < 5; i++) {
        const angle = (i/5)*Math.PI*2;
        ctx.beginPath();
        ctx.arc(turd.x+Math.cos(angle)*(10+spread*0.8), GROUND_Y-2+Math.sin(angle)*1.5, 4+spread*0.1, 0, Math.PI*2);
        ctx.fill();
      }
    } else {
      const x = turd.x, y = turd.y;
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath(); ctx.ellipse(x+3, GROUND_Y-2, turd.radius+2, 4, 0, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = '#7B5236';
      ctx.beginPath(); ctx.ellipse(x, y+5, 15, 11, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#8B5A2B';
      ctx.beginPath(); ctx.ellipse(x-1, y-2, 12, 9, -0.15, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x-2, y-9, 8, 7, -0.25, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#9B6A3B';
      ctx.beginPath(); ctx.ellipse(x-2, y-15, 5, 5, -0.35, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#7B5236'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(x-5, y-17, 3, 0.5, Math.PI*1.5); ctx.stroke();
      ctx.strokeStyle = '#5C3317'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(x, y+5, 15, 11, 0, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.ellipse(x+4, y-1, 4, 3, 0, 0, Math.PI*2); ctx.fill();

      if (turd.launched) {
        const speed = Math.sqrt(turd.vx*turd.vx + turd.vy*turd.vy);
        if (speed > 2) {
          ctx.strokeStyle = 'rgba(107,142,35,0.6)'; ctx.lineWidth = 1.5;
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            const baseY = y-22-i*7;
            const wobble = Math.sin(Date.now()/120+i*2)*4;
            ctx.moveTo(x-7, baseY);
            ctx.quadraticCurveTo(x+wobble, baseY-8, x+7, baseY);
            ctx.stroke();
          }
        }
      }
    }
    ctx.restore();
  }

  restart() { this.loadLevel(); }

  nextLevel() {
    if (this.level < levels.length - 1) { this.level++; this.loadLevel(); }
    else this.showMessage('🏆 YOU BEAT ALL LEVELS! 💩🏆');
  }

  loop() {
    this.update();
    this.draw();
    requestAnimationFrame(() => this.loop());
  }
}

const game = new Game();
</script>
